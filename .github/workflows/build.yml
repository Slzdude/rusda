name: Build and Release

on:
  push:
    tags:
      - '[0-9]*'  # 匹配纯数字开头的 tag，如 17.15.4

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rusda
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "Building for Frida version: $TAG"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install lief

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /tmp
          echo "ANDROID_NDK_ROOT=/tmp/android-ndk-r29" >> $GITHUB_ENV
          rm /tmp/ndk.zip

      - name: Clone Frida source
        run: |
          git clone --recurse-submodules -b ${{ steps.version.outputs.version }} \
            https://github.com/frida/frida frida-src

      - name: Apply patches
        run: python ${{ github.workspace }}/tools/apply_patches.py frida-src

      - name: Build
        working-directory: frida-src
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_ROOT }}
        run: |
          # Build single architecture
          mkdir -p build
          cd build
          ../configure \
            --prefix=$(pwd)/../dist/staging \
            --host=android-arm64 \
            --enable-server \
            --enable-gadget \
            --enable-inject
          make -j$(nproc)
          make install

      - name: Package artifacts
        working-directory: frida-src
        run: |
          VERSION=${{ steps.version.outputs.version }}
          ARCH=arm64
          STAGING=dist/staging
          OUTPUT=dist/output
          mkdir -p $OUTPUT

          # Get brand name
          BRAND=$(grep -oP "helper_name = '\K[^']*" subprojects/frida-core/meson.build | sed 's/-helper//')
          echo "Brand: $BRAND"

          # Package server
          if [ -f "$STAGING/bin/${BRAND}-server" ]; then
            xz -c -T0 "$STAGING/bin/${BRAND}-server" > "$OUTPUT/${BRAND}-server-${VERSION}-android-${ARCH}.xz"
          fi

          # Package inject
          if [ -f "$STAGING/bin/${BRAND}-inject" ]; then
            xz -c -T0 "$STAGING/bin/${BRAND}-inject" > "$OUTPUT/${BRAND}-inject-${VERSION}-android-${ARCH}.xz"
          fi

          # Package gadget
          BITS=$([ "$ARCH" = "arm" ] || [ "$ARCH" = "x86" ] && echo 32 || echo 64)
          GADGET=$(find "$STAGING/lib" -path "*/${BITS}/${BRAND}-gadget.so" | head -1)
          if [ -n "$GADGET" ] && [ -f "$GADGET" ]; then
            xz -c -T0 "$GADGET" > "$OUTPUT/${BRAND}-gadget-${VERSION}-android-${ARCH}.so.xz"
          fi

          # Package compiler
          COMPILER=$(find "$STAGING/lib" -name "*compiler*.so" -o -name "*compiler*.dll" | head -1)
          if [ -n "$COMPILER" ] && [ -f "$COMPILER" ]; then
            xz -c -T0 "$COMPILER" > "$OUTPUT/${BRAND}-compiler-${VERSION}-android-${ARCH}.so.xz"
          fi

      - name: Verify artifacts
        working-directory: frida-src
        run: |
          echo "=== 验证编译产物 ==="
          VERSION=${{ steps.version.outputs.version }}
          ARCH=arm64
          STAGING=dist/staging
          BRAND=$(grep -oP "helper_name = '\K[^']*" subprojects/frida-core/meson.build | sed 's/-helper//')

          echo "品牌名: $BRAND"
          echo "版本: $VERSION"
          echo ""

          # 1. 检查文件存在
          echo "1. 检查文件存在..."
          for f in "$STAGING/bin/${BRAND}-server" "$STAGING/bin/${BRAND}-inject"; do
            if [ -f "$f" ]; then
              echo "  ✓ $(basename $f) ($(du -h $f | cut -f1))"
            else
              echo "  ✗ $(basename $f) 不存在"
              exit 1
            fi
          done

          # 2. 检查 ELF 架构
          echo ""
          echo "2. 检查 ELF 架构..."
          for f in "$STAGING/bin/${BRAND}-server" "$STAGING/bin/${BRAND}-inject"; do
            MACHINE=$(readelf -h "$f" 2>/dev/null | grep "Machine:" | awk '{print $2, $3}')
            if echo "$MACHINE" | grep -q "AArch64"; then
              echo "  ✓ $(basename $f): $MACHINE"
            else
              echo "  ✗ $(basename $f): $MACHINE (期望 AArch64)"
              exit 1
            fi
          done

          # 3. 检查特征串已清除
          echo ""
          echo "3. 检查特征串清除..."
          for feature in "FridaScriptEngine" "GumScript" "GLib-GIO" "GDBusProxy" "gum-js-loop" "gmain" "gdbus"; do
            if strings "$STAGING/bin/${BRAND}-server" | grep -q "$feature"; then
              echo "  ✗ $feature 仍存在"
              exit 1
            else
              echo "  ✓ $feature 已清除"
            fi
          done

          # 4. 检查反转后的串存在
          echo ""
          echo "4. 检查反转串..."
          for feature in "enignEtpircSadirF" "tpircSmuG"; do
            if strings "$STAGING/bin/${BRAND}-server" | grep -q "$feature"; then
              echo "  ✓ $feature 存在"
            else
              echo "  ✗ $feature 不存在"
            fi
          done

          # 5. 检查品牌名替换
          echo ""
          echo "5. 检查品牌名..."
          if strings "$STAGING/bin/${BRAND}-server" | grep -q "rusda"; then
            echo "  ✗ 'rusda' 仍存在"
          else
            echo "  ✓ 'rusda' 已替换"
          fi

          echo ""
          echo "=== 验证完成 ==="

      - name: Test with Android Emulator (optional)
        if: success()
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: arm64
          profile: Nexus 6
          script: |
            echo "=== Android Emulator 测试 ==="
            # 等待模拟器启动
            adb wait-for-device
            sleep 30

            # 推送 server
            BRAND=$(grep -oP "helper_name = '\K[^']*" subprojects/frida-core/meson.build | sed 's/-helper//')
            adb push "dist/staging/bin/${BRAND}-server" /data/local/tmp/
            adb shell "chmod 755 /data/local/tmp/${BRAND}-server"

            # 启动 server
            adb shell "/data/local/tmp/${BRAND}-server" &
            sleep 5

            # 测试连接
            if adb shell "netstat -tlnp | grep 27042"; then
              echo "✓ Server 正在监听"
            else
              echo "✗ Server 未监听"
            fi

            # 安装 frida-tools 测试
            pip install frida-tools
            frida-ps -U || echo "连接失败"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-arm64
          path: frida-src/dist/output/*.xz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: artifacts/**/*.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

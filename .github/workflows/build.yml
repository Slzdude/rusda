name: Build and Release

on:
  push:
    tags:
      - '[0-9]*'  # 匹配纯数字开头的 tag，如 17.15.4

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rusda
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "Building for Frida version: $TAG"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install lief

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /tmp
          echo "ANDROID_NDK_ROOT=/tmp/android-ndk-r29" >> $GITHUB_ENV
          rm /tmp/ndk.zip

      - name: Clone Frida source
        run: |
          git clone --recurse-submodules -b ${{ steps.version.outputs.version }} \
            https://github.com/frida/frida frida-src

      - name: Apply patches
        run: python ${{ github.workspace }}/tools/apply_patches.py frida-src

      - name: Install compiler dependencies
        working-directory: frida-src/subprojects/frida-core/src/compiler
        run: npm install

      - name: Build
        working-directory: frida-src
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_ROOT }}
        run: |
          # Build single architecture
          mkdir -p build
          cd build
          ../configure \
            --prefix=$(pwd)/../dist/staging \
            --host=android-arm64 \
            --enable-server \
            --enable-gadget \
            --enable-inject
          make -j$(nproc)
          make install

      - name: Package artifacts
        working-directory: frida-src
        run: |
          VERSION=${{ steps.version.outputs.version }}
          ARCH=arm64
          STAGING=dist/staging
          OUTPUT=dist/output
          mkdir -p $OUTPUT

          # Get brand name
          BRAND=$(grep -oP "helper_name = '\K[^']*" subprojects/frida-core/meson.build | sed 's/-helper//')
          echo "Brand: $BRAND"

          # Package server
          if [ -f "$STAGING/bin/${BRAND}-server" ]; then
            xz -c -T0 "$STAGING/bin/${BRAND}-server" > "$OUTPUT/${BRAND}-server-${VERSION}-android-${ARCH}.xz"
          fi

          # Package inject
          if [ -f "$STAGING/bin/${BRAND}-inject" ]; then
            xz -c -T0 "$STAGING/bin/${BRAND}-inject" > "$OUTPUT/${BRAND}-inject-${VERSION}-android-${ARCH}.xz"
          fi

          # Package gadget
          BITS=$([ "$ARCH" = "arm" ] || [ "$ARCH" = "x86" ] && echo 32 || echo 64)
          GADGET=$(find "$STAGING/lib" -path "*/${BITS}/${BRAND}-gadget.so" | head -1)
          if [ -n "$GADGET" ] && [ -f "$GADGET" ]; then
            xz -c -T0 "$GADGET" > "$OUTPUT/${BRAND}-gadget-${VERSION}-android-${ARCH}.so.xz"
          fi

          # Package compiler
          COMPILER=$(find "$STAGING/lib" -name "*compiler*.so" -o -name "*compiler*.dll" | head -1)
          if [ -n "$COMPILER" ] && [ -f "$COMPILER" ]; then
            xz -c -T0 "$COMPILER" > "$OUTPUT/${BRAND}-compiler-${VERSION}-android-${ARCH}.so.xz"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-arm64
          path: frida-src/dist/output/*.xz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: artifacts/**/*.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

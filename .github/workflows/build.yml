name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - '[0-9]*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rusda
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG="17.15.4"
          fi
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "Building for Frida version: $TAG"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install lief

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /tmp
          echo "ANDROID_NDK_ROOT=/tmp/android-ndk-r29" >> $GITHUB_ENV
          rm /tmp/ndk.zip

      - name: Clone Frida source
        run: |
          git clone --recurse-submodules -b ${{ steps.version.outputs.version }} \
            https://github.com/frida/frida frida-src

      - name: Apply patches
        run: python ${{ github.workspace }}/tools/apply_patches.py frida-src

      - name: Build
        working-directory: frida-src
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_ROOT }}
        run: |
          mkdir -p build
          cd build
          ../configure \
            --prefix=$(pwd)/../dist/staging \
            --host=android-arm64 \
            --enable-server \
            --enable-gadget \
            --enable-inject
          make -j$(nproc)
          make install

      - name: Verify artifacts
        working-directory: frida-src
        run: |
          echo "=== 验证编译产物 ==="
          STAGING=dist/staging
          BRAND=$(grep -oP "helper_name = '\K[^']*" subprojects/frida-core/meson.build | sed 's/-helper//')

          echo "品牌名: $BRAND"
          echo ""

          # 1. 检查文件存在
          echo "1. 检查文件存在..."
          for f in "$STAGING/bin/${BRAND}-server" "$STAGING/bin/${BRAND}-inject"; do
            if [ -f "$f" ]; then
              echo "  ✓ $(basename $f) ($(du -h $f | cut -f1))"
            else
              echo "  ✗ $(basename $f) 不存在"
              exit 1
            fi
          done

          # 2. 检查 ELF 架构
          echo ""
          echo "2. 检查 ELF 架构..."
          for f in "$STAGING/bin/${BRAND}-server" "$STAGING/bin/${BRAND}-inject"; do
            MACHINE=$(readelf -h "$f" 2>/dev/null | grep "Machine:" | awk '{print $2, $3}')
            if echo "$MACHINE" | grep -q "AArch64"; then
              echo "  ✓ $(basename $f): $MACHINE"
            else
              echo "  ✗ $(basename $f): $MACHINE (期望 AArch64)"
              exit 1
            fi
          done

          # 3. 检查特征串已清除
          echo ""
          echo "3. 检查特征串清除..."
          for feature in "FridaScriptEngine" "GumScript" "GLib-GIO" "GDBusProxy" "gum-js-loop" "gmain" "gdbus"; do
            if strings "$STAGING/bin/${BRAND}-server" | grep -q "$feature"; then
              echo "  ✗ $feature 仍存在"
              exit 1
            else
              echo "  ✓ $feature 已清除"
            fi
          done

          # 4. 检查反转串存在
          echo ""
          echo "4. 检查反转串..."
          for feature in "enignEtpircSadirF" "tpircSmuG"; do
            if strings "$STAGING/bin/${BRAND}-server" | grep -q "$feature"; then
              echo "  ✓ $feature 存在"
            else
              echo "  ✗ $feature 不存在"
            fi
          done

          # 5. 检查品牌名替换
          echo ""
          echo "5. 检查品牌名..."
          if strings "$STAGING/bin/${BRAND}-server" | grep -q "rusda"; then
            echo "  ✗ 'rusda' 仍存在"
          else
            echo "  ✓ 'rusda' 已替换"
          fi

          echo ""
          echo "=== 验证完成 ==="

      - name: Test with Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: arm64
          profile: Nexus 6
          script: |
            echo "=== Android Emulator 测试 ==="

            # 等待模拟器启动
            adb wait-for-device
            adb wait-for-device shell getprop sys.boot_completed | grep -q "1"
            sleep 30

            # 获取品牌名
            BRAND=$(grep -oP "helper_name = '\K[^']*" subprojects/frida-core/meson.build | sed 's/-helper//')
            echo "品牌名: $BRAND"

            # 推送 server
            echo "推送 server..."
            adb push "dist/staging/bin/${BRAND}-server" /data/local/tmp/
            adb shell "chmod 755 /data/local/tmp/${BRAND}-server"

            # 启动 server
            echo "启动 server..."
            adb shell "/data/local/tmp/${BRAND}-server" &
            sleep 5

            # 检查端口
            echo "检查端口..."
            if adb shell "netstat -tlnp 2>/dev/null | grep 27042" || adb shell "ss -tlnp | grep 27042"; then
              echo "✓ Server 正在监听端口 27042"
            else
              echo "✗ Server 未监听"
              exit 1
            fi

            # 安装 frida-tools
            echo "安装 frida-tools..."
            pip install frida-tools

            # 测试进程枚举
            echo "测试进程枚举..."
            if frida-ps -U; then
              echo "✓ 进程枚举成功"
            else
              echo "✗ 进程枚举失败"
              exit 1
            fi

            # 测试 attach
            echo "测试 attach..."
            TARGET_PID=$(frida-ps -U | grep -i "system_server" | awk '{print $1}' | head -1)
            if [ -n "$TARGET_PID" ]; then
              echo "附加到 system_server (PID: $TARGET_PID)..."
              timeout 10 frida -U $TARGET_PID -e "console.log('attach OK'); console.log('PID:', Process.id);" 2>&1 | head -10 || true
              echo "✓ Attach 测试完成"
            fi

            echo ""
            echo "=== Android 测试完成 ==="

      - name: Package artifacts (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: frida-src
        run: |
          VERSION=${{ steps.version.outputs.version }}
          ARCH=arm64
          STAGING=dist/staging
          OUTPUT=dist/output
          mkdir -p $OUTPUT

          BRAND=$(grep -oP "helper_name = '\K[^']*" subprojects/frida-core/meson.build | sed 's/-helper//')
          echo "打包 $BRAND $VERSION..."

          # Package server
          if [ -f "$STAGING/bin/${BRAND}-server" ]; then
            xz -c -T0 "$STAGING/bin/${BRAND}-server" > "$OUTPUT/${BRAND}-server-${VERSION}-android-${ARCH}.xz"
          fi

          # Package inject
          if [ -f "$STAGING/bin/${BRAND}-inject" ]; then
            xz -c -T0 "$STAGING/bin/${BRAND}-inject" > "$OUTPUT/${BRAND}-inject-${VERSION}-android-${ARCH}.xz"
          fi

          # Package gadget
          BITS=64
          GADGET=$(find "$STAGING/lib" -path "*/${BITS}/${BRAND}-gadget.so" | head -1)
          if [ -n "$GADGET" ] && [ -f "$GADGET" ]; then
            xz -c -T0 "$GADGET" > "$OUTPUT/${BRAND}-gadget-${VERSION}-android-${ARCH}.so.xz"
          fi

          echo "打包完成"
          ls -lh $OUTPUT/

      - name: Upload artifacts (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-arm64
          path: frida-src/dist/output/*.xz

  build-zygisk:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rusda
        uses: actions/checkout@v4

      - name: Checkout ZygiskFrida
        run: |
          git clone https://github.com/lico-n/ZygiskFrida.git ZygiskFrida

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download gadget artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-arm64
          path: dist-android

      - name: Extract brand from artifacts
        run: |
          # Extract brand from artifact filename: {brand}-gadget-{version}-android-{arch}.so.xz
          BRAND=$(ls dist-android/ | grep -oP '^[^-]+(?=-gadget)' | head -1)

          if [ -z "$BRAND" ]; then
            echo "ERROR: Could not extract brand from artifacts"
            ls -la dist-android/
            exit 1
          fi

          echo "Brand: $BRAND"
          echo "BRAND=$BRAND" >> $GITHUB_ENV

      - name: Apply ZygiskFrida patch
        run: |
          python3 tools/apply_zygisk_patch.py --brand ${{ env.BRAND }} --skip-gadgets

      - name: Copy gadgets to ZygiskFrida
        run: |
          BRAND=${{ env.BRAND }}
          mkdir -p ZygiskFrida/gadget

          for f in dist-android/*-gadget-*.so.xz; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            # Extract arch: {brand}-gadget-{version}-android-{arch}.so.xz
            arch=$(echo "$fname" | sed 's/.*-android-\(.*\)\.so\.xz/\1/')

            # Map arch: x86_64 -> x64 (ZygiskFrida convention)
            case "$arch" in
              x86_64) magisk_arch="x64" ;;
              *) magisk_arch="$arch" ;;
            esac

            target="ZygiskFrida/gadget/lib${BRAND}gadget-${magisk_arch}.so.xz"
            cp "$f" "$target"
            echo "Prepared: $fname -> lib${BRAND}gadget-${magisk_arch}.so.xz"
          done

          ls -lh ZygiskFrida/gadget/

      - name: Build Zygisk module
        working-directory: ZygiskFrida
        run: |
          chmod +x gradlew
          ./gradlew :module:assembleZygiskRelease

      - name: List Zygisk artifacts
        run: |
          echo "=== Zygisk 模块产物 ==="
          ls -lh ZygiskFrida/out/*.zip 2>/dev/null || echo "No ZIP files found"

      - name: Upload Zygisk artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zygisk-module
          path: ZygiskFrida/out/*.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, build-zygisk]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.xz
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

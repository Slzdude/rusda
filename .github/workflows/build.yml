name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - '[0-9]*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rusda
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG="17.15.4"
          fi
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "Building for Frida version: $TAG"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install lief

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /tmp
          echo "ANDROID_NDK_ROOT=/tmp/android-ndk-r29" >> $GITHUB_ENV
          rm /tmp/ndk.zip

      - name: Clone Frida source
        run: |
          git clone --recurse-submodules -b ${{ steps.version.outputs.version }} \
            https://github.com/frida/frida frida-src

      - name: Apply patches
        run: python ${{ github.workspace }}/tools/apply_patches.py frida-src

      - name: Build arm64
        working-directory: frida-src
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_ROOT }}
        run: |
          mkdir -p build-android-arm64
          cd build-android-arm64
          ../configure \
            --prefix=$(pwd)/../dist-android/staging-arm64 \
            --host=android-arm64 \
            --enable-server \
            --enable-gadget \
            --enable-inject
          make -j$(nproc)
          make install

      - name: Build arm
        working-directory: frida-src
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_ROOT }}
        run: |
          mkdir -p build-android-arm
          cd build-android-arm
          ../configure \
            --prefix=$(pwd)/../dist-android/staging-arm \
            --host=android-arm \
            --enable-gadget \
            --enable-inject
          make -j$(nproc)
          make install

      - name: Verify artifacts
        working-directory: frida-src
        run: |
          echo "=== 验证编译产物 ==="
          BRAND=$(grep -oP "helper_name = '\K[^']*" subprojects/frida-core/meson.build | sed 's/-helper//')

          echo "品牌名: $BRAND"
          echo ""

          for ARCH in arm64 arm; do
            echo "--- 验证 $ARCH ---"
            STAGING=dist-android/staging-$ARCH

            # 1. 检查文件存在
            echo "1. 检查文件存在..."
            for f in "$STAGING/lib/gadget/${BRAND}-gadget.so"; do
              if [ -f "$f" ]; then
                echo "  ✓ $(basename $f) ($(du -h $f | cut -f1))"
              else
                echo "  ✗ $(basename $f) 不存在"
                exit 1
              fi
            done

            # 2. 检查 ELF 架构
            echo ""
            echo "2. 检查 ELF 架构..."
            GADGET="$STAGING/lib/gadget/${BRAND}-gadget.so"
            if [ -f "$GADGET" ]; then
              MACHINE=$(readelf -h "$GADGET" 2>/dev/null | grep "Machine:" | awk '{print $2, $3}')
              if [ "$ARCH" = "arm64" ] && echo "$MACHINE" | grep -q "AArch64"; then
                echo "  ✓ gadget: $MACHINE"
              elif [ "$ARCH" = "arm" ] && echo "$MACHINE" | grep -q "ARM"; then
                echo "  ✓ gadget: $MACHINE"
              else
                echo "  ✗ gadget: $MACHINE (架构不匹配)"
                exit 1
              fi
            fi

            echo ""
          done

          echo "=== 验证完成 ==="

      - name: Package artifacts (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: frida-src
        run: |
          VERSION=${{ steps.version.outputs.version }}
          OUTPUT=dist/output
          mkdir -p $OUTPUT

          BRAND=$(grep -oP "helper_name = '\K[^']*" subprojects/frida-core/meson.build | sed 's/-helper//')
          echo "打包 $BRAND $VERSION..."

          # 保存品牌名供后续使用
          echo "$BRAND" > $OUTPUT/brand.txt

          for ARCH in arm64 arm; do
            echo "--- 打包 $ARCH ---"
            STAGING=dist-android/staging-$ARCH

            # Package server (only arm64)
            if [ "$ARCH" = "arm64" ] && [ -f "$STAGING/bin/${BRAND}-server" ]; then
              xz -c -T0 "$STAGING/bin/${BRAND}-server" > "$OUTPUT/${BRAND}-server-${VERSION}-android-${ARCH}.xz"
              echo "  ✓ server"
            fi

            # Package inject (only arm64)
            if [ "$ARCH" = "arm64" ] && [ -f "$STAGING/bin/${BRAND}-inject" ]; then
              xz -c -T0 "$STAGING/bin/${BRAND}-inject" > "$OUTPUT/${BRAND}-inject-${VERSION}-android-${ARCH}.xz"
              echo "  ✓ inject"
            fi

            # Package gadget
            GADGET=$(find "$STAGING/lib" -name "${BRAND}-gadget.so" | head -1)
            if [ -n "$GADGET" ] && [ -f "$GADGET" ]; then
              xz -c -T0 "$GADGET" > "$OUTPUT/${BRAND}-gadget-${VERSION}-android-${ARCH}.so.xz"
              echo "  ✓ gadget"
            fi
          done

          echo "打包完成"
          ls -lh $OUTPUT/

      - name: Upload artifacts (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: |
            frida-src/dist/output/*.xz
            frida-src/dist/output/brand.txt

  build-zygisk:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rusda
        uses: actions/checkout@v4

      - name: Checkout ZygiskFrida
        run: |
          git clone https://github.com/lico-n/ZygiskFrida.git ZygiskFrida

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Download gadget artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts
          path: dist-android

      - name: Extract brand from artifacts
        run: |
          # 优先从 brand.txt 读取品牌名
          if [ -f dist-android/brand.txt ]; then
            BRAND=$(cat dist-android/brand.txt | tr -d '[:space:]')
          else
            # 回退：从文件名提取
            BRAND=$(ls dist-android/ | grep -oP '^[^-]+(?=-gadget)' | head -1)
          fi

          if [ -z "$BRAND" ]; then
            echo "ERROR: Could not extract brand from artifacts"
            ls -la dist-android/
            exit 1
          fi

          echo "Brand: $BRAND"
          echo "BRAND=$BRAND" >> $GITHUB_ENV

      - name: Apply ZygiskFrida patch
        run: |
          python3 tools/apply_zygisk_patch.py --brand ${{ env.BRAND }} --skip-gadgets

      - name: Copy gadgets to ZygiskFrida
        run: |
          BRAND=${{ env.BRAND }}
          mkdir -p ZygiskFrida/gadget

          for f in dist-android/*-gadget-*.so.xz; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            # Extract arch: {brand}-gadget-{version}-android-{arch}.so.xz
            arch=$(echo "$fname" | sed 's/.*-android-\(.*\)\.so\.xz/\1/')

            # Map arch: x86_64 -> x64 (ZygiskFrida convention)
            case "$arch" in
              x86_64) magisk_arch="x64" ;;
              *) magisk_arch="$arch" ;;
            esac

            target="ZygiskFrida/gadget/lib${BRAND}gadget-${magisk_arch}.so.xz"
            cp "$f" "$target"
            echo "Prepared: $fname -> lib${BRAND}gadget-${magisk_arch}.so.xz"
          done

          ls -lh ZygiskFrida/gadget/

      - name: Build Zygisk module
        working-directory: ZygiskFrida
        run: |
          chmod +x gradlew
          ./gradlew :module:assembleZygiskRelease

      - name: List Zygisk artifacts
        run: |
          echo "=== Zygisk 模块产物 ==="
          ls -lh ZygiskFrida/out/*.zip 2>/dev/null || echo "No ZIP files found"

      - name: Upload Zygisk artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zygisk-module
          path: ZygiskFrida/out/*.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, build-zygisk]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.xz
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
